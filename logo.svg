  -->
  <!-- Left chevron — green -->
  <path d="M2 54 L19 10 Q20 6 21 10 L39 54 Z" fill="#2D6A4F"/>
  <!-- Right chevron — terracotta -->
  <path d="M41 54 L59 10 Q60 6 61 10 L78 54 Z" fill="#C4622D"/>
